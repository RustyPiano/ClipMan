name: 'Release'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Triggers on tags like v1.0.0, v1.2.3

# Don't cancel an in-flight release build if the same tag is re-pushed; let it
# finish (distinct tags have distinct refs, so they never share this group).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fast gate (seconds, no build) so a mistagged or notes-less release fails
  # before four platform runners spin up. Asserts the tag matches every manifest
  # version and that the release notes file for this version exists.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: manifest versions match the tag
        run: bash scripts/check-versions.sh "${{ github.ref_name }}"
      - name: release notes present
        run: |
          VERSION_NUM="${GITHUB_REF_NAME#v}"
          if [ ! -f "release_notes_${VERSION_NUM}.md" ]; then
            echo "::error::release_notes_${VERSION_NUM}.md is missing — write it before tagging" >&2
            exit 1
          fi

  publish-tauri:
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Extract release notes
        id: release_notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          # Remove 'v' prefix to get version number
          VERSION_NUM="${VERSION#v}"
          NOTES_FILE="release_notes_${VERSION_NUM}.md"
          
          if [ -f "$NOTES_FILE" ]; then
            echo "Found release notes file: $NOTES_FILE"
            # Read file content and set as output
            NOTES=$(cat "$NOTES_FILE")
            # Escape special characters for GitHub Actions
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # preflight already guards this; fail here too rather than ship a
            # release with a placeholder body.
            echo "::error::No release notes file found: $NOTES_FILE" >&2
            exit 1
          fi

      # macOS code signing with a SELF-SIGNED certificate (no Apple Developer
      # account). Goal: keep the app's Designated Requirement stable across
      # releases so users grant Accessibility only once and it survives updates.
      # We set up the keychain ourselves (rather than let tauri-action import the
      # cert) because a self-signed cert is untrusted by default and is filtered
      # out of `security find-identity -v -p codesigning` — which is what the
      # Tauri bundler uses to resolve the identity ("failed to resolve signing
      # identity"). Trusting it as a code-signing root fixes that. NOT notarized:
      # users still see a one-time Gatekeeper prompt on first open. The same cert
      # MUST be reused for every release, or all users re-grant after the update.
      - name: Set up self-signed code signing (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/clipman-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          CERT_P12="$RUNNER_TEMP/clipman-cert.p12"
          CERT_PEM="$RUNNER_TEMP/clipman-cert.pem"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"

          # Fresh keychain holding the signing identity.
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"            # no auto-lock during the build
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$CERT_P12" -P "$APPLE_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          # Make it the default and the only keychain in the search list.
          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN"

          # Trust the self-signed cert as a code-signing root so it counts as a
          # valid identity (otherwise: "failed to resolve signing identity").
          security find-certificate -c "ClipMan Code Signing" -p "$KEYCHAIN" > "$CERT_PEM"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$CERT_PEM"

          echo "Valid code-signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -q '"ClipMan Code Signing"'; then
            echo "ERROR: 'ClipMan Code Signing' is not a valid codesigning identity after trust setup" >&2
            exit 1
          fi

      # Pinned to the exact `dev` branch head (as of 2026-07-07) instead of the
      # floating `@dev` ref: freezes the action code for reproducible releases
      # and follows the SHA-pinning supply-chain practice for third-party
      # actions. Bump deliberately (ideally to a published release tag) when a
      # newer tauri-action is validated against this release pipeline.
      - uses: tauri-apps/tauri-action@7f1a1fc1989f3d1e114195e2a9624d147de78612 # dev @ 2026-07-07
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # The keychain + trusted identity are prepared by the macOS step above;
          # the Tauri bundler picks this identity up from the default keychain.
          # No APPLE_CERTIFICATE here on purpose — we manage the keychain ourselves.
          APPLE_SIGNING_IDENTITY: 'ClipMan Code Signing'
        with:
          tagName: ${{ github.ref_name }} # Use the tag name that triggered the workflow
          releaseName: '${{ github.ref_name }}' # Version number only for Tauri updater compatibility
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
